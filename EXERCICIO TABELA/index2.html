<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio Tabela</title>
    <style>
        td {
            border: solid 2px rgb(12, 11, 11);
            width: 150px;
            height: 100px;
            text-align: center;
            
        }

    </style>
</head>
<body>
    <table>
        <tbody>
            <tr>
                <td colspan="4">A</td>
                <td rowspan="4">B</td>
                
            </tr>
            <tr>
                <td rowspan="4">C</td>
                <td>D</td>
                <td>E</td>
                <td>F</td>
                
            </tr>
            <tr>
                <td>G</td>
                <td>H</td>
                <td>I</td>
                
            </tr>
            <tr>
                <td>J</td>
                <td>K</td>
                <td>M</td>
                
            </tr>
            <tr>
                <td colspan="4">N</td>
                
            </tr>
        </tbody>
    </table>
    
</body>
</html>
