<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio Ciando Minha Primeira Tabela</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        table {
            border: solid 2px black;
            background-color: black;
        }
        
        table > tbody > tr > td {
            border: solid 2px rgb(199, 181, 181);
            height: 50px;
            width: 80px;
            text-align: center;
            border-radius: 15px;
            color: aliceblue;
            background-color: rgb(30, 48, 48);
        }

    </style>
</head>
<body>
    <table>
        <tbody>
            <tr>
                <td>1</td>
                <td>2</td>
                <td rowspan="2">3</td>
                <td>4</td>
            </tr>
            <tr>
                <td>5</td>
                <td>6</td>
                <td>7</td>
                
            </tr>
            <tr>
                <td colspan="3">8</td>
                <td>9</td>
                
            </tr>
            <tr>
                <td rowspan="2">10</td>
                <td colspan="2">11</td>
                <td>12</td>
                
            </tr>
            <tr>
                <td>13</td>
                <td>14</td>
                <td>15</td>
                =
            </tr>
        </tbody>
    </table>
    
</body>
</html>
