<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>minha primeira tabela</title>
    <style>
        table {
            width: 400px;
            height: 400px;

            
            padding: 10px;
            border-collapse: separate;
            
            
        }
        td  {
            border: 1px, solid black;
            padding: 10px;
            text-align: center;
            vertical-align: middle;
            

        }

    </style>

</head>
<body>
    <h1>Minha primeira Tabela</h1>
    <!-- hierarquia de tabelas simples
    table= ntabela
    table row = linha de tabela
    tabela header = cabeçario de tabela
    table data = dado de tabela -->

    
    <table>
        <tr>        
            <td>A1</td>
            <TD>B1</TD>
            <td>C1</td>
        </tr>
        <tr>        
            <td>A2</td>
            <TD>B2</TD>
            <td>C2</td>
        </tr>
        <tr>        
            <td>A3</td>
            <TD>B3</TD>
            <td>C3</td>
        </tr>
        <tr>        
            <td>A4</td>
            <TD>B4</TD>
            <td>C4</td>
        </tr>

    </table>
    
</body>
</html>
